@if (masterDataTableConfig) {
<mat-card>
    <mat-card-content>
        <h2 style="padding: 8px 16px;">{{masterDataTableConfig.title}}</h2>

        <div class="filter-bar">
            <mat-form-field appearance="outline" class="form-field-sm">
                <mat-label>Filter</mat-label>
                <input matInput (keyup)="applyFilter($event)" placeholder="E.g. john" #input>
                <mat-icon matSuffix>search</mat-icon>
            </mat-form-field>
        </div>

        <table mat-table [dataSource]="dataSource" matSort (matSortChange)="announceSortChange($event)">

            <!-- Dynamic Columns -->

            @for (col of displayedColumns; track col ){
            <ng-container [matColumnDef]="col">

                <th mat-header-cell *matHeaderCellDef [mat-sort-header]="col">
                    {{ masterDataTableConfig.columnLabels[col] || col }}
                </th>

                <td mat-cell *matCellDef="let row">
                    {{ getValue(row, col) }}
                </td>

            </ng-container>
            }

            <!-- Header -->
            <tr mat-header-row *matHeaderRowDef="masterDataTableConfig.displayedColumns"></tr>

            <!-- ROW (SAP-style selection) -->
            <tr mat-row *matRowDef="let row; columns: masterDataTableConfig.displayedColumns" (click)="onSelect(row)"
                [class.selected]="isSelected(row)" class="data-row">
            </tr>

            <!-- Row shown when there is no matching data. -->
            <tr class="mat-row" *matNoDataRow>
                <td class="mat-cell" colspan="4">No data matching the filter "{{input.value}}"</td>
            </tr>

        </table>

        <mat-paginator [pageSizeOptions]="[5, 10, 20]" showFirstLastButtons
            aria-label="Select page of periodic elements">
        </mat-paginator>
    </mat-card-content>
</mat-card>
}

<p>master-data-table.component works!</p>

@if (lookupConfig) {

  <div mat-dialog-title class="dialog-header">
    <mat-icon class="dialog-icon">manage_search</mat-icon>
    <span>{{ lookupConfig.title }}</span>
    <button mat-icon-button mat-dialog-close class="close-btn" aria-label="Close dialog">
      <mat-icon>close</mat-icon>
    </button>
  </div>

  <mat-dialog-content class="dialog-content">

    <mat-form-field appearance="outline" class="filter-field">
      <mat-label>Search</mat-label>
      <input matInput (keyup)="applyFilter($event)" placeholder="Type to filter..." #input autocomplete="off">
      <mat-icon matSuffix>filter_list</mat-icon>
    </mat-form-field>

    <div class="table-wrapper">
      <table mat-table [dataSource]="dataSource" matSort (matSortChange)="announceSortChange($event)">

        @for (col of displayedColumns; track col) {
          <ng-container [matColumnDef]="col">
            <th mat-header-cell *matHeaderCellDef mat-sort-header>
              {{ lookupConfig.columnLabels[col] || col }}
            </th>
            <td mat-cell *matCellDef="let row">{{ getValue(row, col) }}</td>
          </ng-container>
        }

        <tr mat-header-row *matHeaderRowDef="lookupConfig.displayedColumns"></tr>
        <tr mat-row *matRowDef="let row; columns: lookupConfig.displayedColumns"
            (click)="onSelect(row)"
            [class.selected]="isSelected(row)"
            class="data-row">
        </tr>

        <tr class="mat-row" *matNoDataRow>
          <td class="no-data-cell" [attr.colspan]="displayedColumns.length">
            <mat-icon>search_off</mat-icon>
            <span>No results for "{{ input.value }}"</span>
          </td>
        </tr>

      </table>
    </div>

    <mat-paginator [pageSizeOptions]="[5, 10, 20]" showFirstLastButtons aria-label="Select page">
    </mat-paginator>

  </mat-dialog-content>

  <mat-dialog-actions align="end">
    <button mat-button (click)="onNoClick()">Close</button>
  </mat-dialog-actions>

}

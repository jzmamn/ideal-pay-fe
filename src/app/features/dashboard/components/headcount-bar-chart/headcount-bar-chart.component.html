<div class="chart-card">
  <div class="chart-header">
    <h3 class="chart-title">Headcount by Department</h3>
  </div>
  <div class="chart-body">
    <canvas
      baseChart
      [data]="chartData()"
      [options]="chartOptions"
      type="bar"
      aria-label="Horizontal bar chart showing headcount per department"
      role="img"
    ></canvas>
  </div>
</div>

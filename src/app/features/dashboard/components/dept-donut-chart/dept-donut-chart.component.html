<div class="chart-card">
  <div class="chart-header">
    <h3 class="chart-title">Cost by Department</h3>
  </div>
  <div class="donut-layout">
    <div class="chart-body">
      <canvas
        baseChart
        [data]="chartData()"
        [options]="chartOptions"
        type="doughnut"
        (chartClick)="onChartClick($event)"
        aria-label="Doughnut chart showing payroll cost by department. Click a slice to drill down."
        role="img"
        style="cursor: pointer"
      ></canvas>
    </div>
    <div class="donut-legend" role="list" aria-label="Department legend">
      @for (item of legendItems(); track item.label) {
        <div class="legend-row" role="listitem">
          <span class="legend-dot" [style.background]="item.color" aria-hidden="true"></span>
          <span class="legend-label">{{ item.label }}</span>
          <span class="legend-pct">{{ item.value }}</span>
        </div>
      }
    </div>
  </div>
</div>

<div mat-dialog-title class="dialog-title">
  <div class="dialog-title-icon">
    <mat-icon>more_time</mat-icon>
  </div>
  <span class="dialog-title-main">Overtime information</span>
  <button mat-icon-button mat-dialog-close class="dialog-close-btn" aria-label="Close dialog">
    <mat-icon>close</mat-icon>
  </button>
</div>

<mat-dialog-content>
  <form [formGroup]="overtimeForm" class="form-grid">

    <mat-form-field appearance="outline">
      <mat-label>ID</mat-label>
      <input matInput formControlName="id">
    </mat-form-field>

    <mat-form-field appearance="outline">
      <mat-label>Code</mat-label>
      <input matInput formControlName="code">
      @if (overtimeForm.get('code')?.hasError('required')) {
        <mat-error>Code is required</mat-error>
      }
    </mat-form-field>

    <mat-form-field appearance="outline">
      <mat-label>Name</mat-label>
      <input matInput formControlName="name">
      @if (overtimeForm.get('name')?.hasError('required')) {
        <mat-error>Name is required</mat-error>
      }
    </mat-form-field>

    <mat-slide-toggle formControlName="isActive">Active</mat-slide-toggle>

    <mat-divider />

    <div class="checkbox-group">
      <mat-checkbox formControlName="liableForEPF">Liable for EPF</mat-checkbox>
      <mat-checkbox formControlName="liableForETF">Liable for ETF</mat-checkbox>
      <mat-checkbox formControlName="liableForNopay">Liable for Nopay</mat-checkbox>
    </div>

  </form>
</mat-dialog-content>

<mat-dialog-actions>
  @if (isEdit) {
  <button mat-flat-button class="btn-error">
    <mat-icon>delete</mat-icon> Delete
  </button>
  }
  <span class="action-spacer"></span>
  <button mat-flat-button [disabled]="overtimeForm.invalid" class="btn-warn">
    <mat-icon>save</mat-icon> {{ isEdit ? 'Update' : 'Save' }}
  </button>
  <button mat-flat-button mat-dialog-close class="btn-secondary">
    <mat-icon>close</mat-icon> Cancel
  </button>
</mat-dialog-actions>
